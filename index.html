<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل البيانات</title>
<meta property="og:title" content="تسجيل البيانات">
<meta property="og:description" content="سجل بياناتك بسهولة الآن">
<meta property="og:image" content="https://raw.githubusercontent.com/Yousef-qweasd/-mahmode/refs/heads/main/WhatsApp%20Image%202026-03-27%20at%202.46.45%20PM.jpeg">
<meta property="og:type" content="website">
<meta name="twitter:title" content="تسجيل البيانات">
<meta name="twitter:description" content="سجل بياناتك بسهولة الآن">
<meta name="twitter:image" content="https://raw.githubusercontent.com/Yousef-qweasd/-mahmode/refs/heads/main/WhatsApp%20Image%202026-03-27%20at%202.46.45%20PM.jpeg">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Cairo', sans-serif;
}

body {
  background: linear-gradient(135deg, #2F6B3F, #7FB77E);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* الكارد */
.container {
  background: #FFF6C0;
  width: 90%;
  max-width: 400px;
  padding: 20px;
  
  /* حواف مميزة (مدبب + منحني) */
  border-radius: 30px 5px 30px 5px;

  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  text-align: center;
  animation: fadeIn 0.6s ease;
  border: 3px solid #F7C85C;
}

/* الصورة */
#topImage {
  width: 100%;
  border-radius: 20px 5px 20px 5px;
  margin-bottom: 15px;
  border: 2px solid #7FB77E;
}

/* العنوان */
h2 {
  color: #2F6B3F;
  margin-bottom: 10px;
}

/* التحذير */
h3 {
  font-size: 13px;
  color: #b02a37;
  margin: 15px 0;
}

/* الانبوت */
input, select {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 15px 5px 15px 5px;
  border: 2px solid #7FB77E;
  outline: none;
  background: #fff;
  transition: 0.3s;
}

/* فوكس */
input:focus, select:focus {
  border-color: #F7C85C;
  box-shadow: 0 0 8px rgba(247,200,92,0.7);
}

/* الزر */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  
  background: linear-gradient(135deg, #F7C85C, #2F6B3F);
  color: #fff;
  
  border: none;
  border-radius: 20px 5px 20px 5px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

/* hover */
button:hover {
  transform: scale(1.07) rotate(-1deg);
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* أنيميشن */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(100px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* استخدمها كده */
.container {
  animation: fadeIn 1.7s cubic-bezier(0.22, 1, 0.36, 1);
}
body {
  background: linear-gradient(135deg, #540863, #92487A);
}

/* الكارد */
.container {
  background: #FFD3D5;
  border: 3px solid #E49BA6;
}

/* الصورة */
#topImage {
  border: 2px solid #92487A;
}

/* العنوان */
h2 {
  color: #540863;
}

/* التحذير */
h3 {
  color: #b02a37; /* زي ما هو */
}

/* الانبوت */
input, select {
  border: 2px solid #92487A;
}

/* فوكس */
input:focus, select:focus {
  border-color: #E49BA6;
  box-shadow: 0 0 8px rgba(228,155,166,0.7);
}

/* الزر */
button {
  background: linear-gradient(135deg, #E49BA6, #540863);
}
</style>

</head>
<body>

<div class="container">

    <!-- الصورة -->
    <img id="topImage" src="https://raw.githubusercontent.com/Yousef-qweasd/-mahmode/refs/heads/main/WhatsApp%20Image%202026-03-27%20at%202.46.45%20PM.jpeg">

    <h2>تسجيل البيانات</h2>

    <input type="text" id="fullName" placeholder="الاسم ثلاثي">

    <input type="tel" id="userNumber" placeholder="رقمك (11 رقم)" pattern="[0-9]*">
    <input type="tel" id="parentNumber" placeholder="رقم ولي الأمر (11 رقم)" pattern="[0-9]*">

    <select id="stage">
        <option value="">اختار المرحلة</option>
        <option value="ثانوي">ثانوي</option>
        <option value="بكالوريا">بكالوريا</option>
    </select>

    <select id="location">
        <option value="">اختار المقر</option>
        <option value="محب">محب أمام مول الشيشيني</option>
        <option value="المنشبه">المنشيه الجديده اول شارع عشره</option>
    </select>
 <h3>⚠️سجل كل البيانات و ارسلها عبر ارسال ثم الوتساب و تأكيد الحجز في المقر خلال أسبوع  ⚠️</h3>
    <!-- الزرين جنب بعض -->
    <button onclick="sendWhatsApp()">إرسال</button>
</div>

<script>

// التحقق من الرقم (11 رقم)
function isValidNumber(num) {
    return /^[0-9]{11}$/.test(num);
}

// التحقق من الاسم ثلاثي
function isValidName(name) {
    let parts = name.trim().split(" ");
    return parts.length === 3 && parts.every(p => p.length > 1);
}

// إرسال البيانات على واتساب
function sendWhatsApp() {
    let name = document.getElementById("fullName").value.trim();
    let user = document.getElementById("userNumber").value.trim();
    let parent = document.getElementById("parentNumber").value.trim();
    let stage = document.getElementById("stage").value;
    let location = document.getElementById("location").value;

    if (!name || !user || !parent || !stage || !location) {
        alert("من فضلك املى كل البيانات");
        return;
    }

    if (!isValidName(name)) {
        alert("من فضلك اكتب الاسم ثلاثي صحيح");
        return;
    }

    if (!isValidNumber(user) || !isValidNumber(parent)) {
        alert("الأرقام لازم تكون 11 رقم بالظبط");
        return;
    }

    let phoneNumber = "201156462942"; // رقمك

    let message = 
    "تسجيل جديد:%0A" +
    "الاسم: " + name + "%0A" +
    "رقم الطالب: " + user + "%0A" +
    "رقم ولي الأمر: " + parent + "%0A" +
    "المرحلة: " + stage + "%0A" +
    "المقر: " + location;

    let url = `https://wa.me/${phoneNumber}?text=${message}`;
    window.open(url, "_blank");
}

</script>

</body>
</html>
